name: 'Terraform'

on:
  push:
    branches: ['main']
    paths: ['terraform/**']
  pull_request:
    branches: ['main']
    paths: ['terraform/**']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write       # Requerido para Workload Identity Federation
  pull-requests: write  # Requerido para publicar el plan como comentario en PRs

env:
  TF_VERSION: '1.10.5'

defaults:
  run:
    working-directory: ./terraform

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 · Validación + Plan (en PRs y en push)
  # ──────────────────────────────────────────────
  plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Autenticación Keyless en GCP (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.INFRA_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.INFRA_SERVICE_ACCOUNT }}

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -out=tfplan \
            -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true  # El siguiente paso publica el resultado aunque falle

      - name: Publicar Plan en PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const status = '${{ steps.plan.outcome }}';
            const body = `## Terraform Plan ${status === 'success' ? '✅' : '❌'}
            <details><summary>Ver plan completo</summary>

            \`\`\`hcl
            ${output}
            \`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fallo si el plan tiene errores
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Subir plan como artefacto
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

  # ──────────────────────────────────────────────
  # JOB 2 · Apply (solo en push a main)
  # ──────────────────────────────────────────────
  apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-24.04
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Autenticación Keyless en GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.INFRA_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.INFRA_SERVICE_ACCOUNT }}

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Descargar plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan